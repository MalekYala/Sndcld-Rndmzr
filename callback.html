<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>SoundCloud OAuth Callback</title>
  </head>
  <body>
    <p>Connecting to SoundCloud...</p>
    <script>
      // OAuth redirect stub.
      // When full OAuth is wired up this page receives the authorization code
      // from SoundCloud and passes it back to the opener window.
      if (window.opener && window.opener.SC) {
        window.opener.SC.connectCallback();
      }
      setTimeout(function () { window.close(); }, 1);
    </script>
  </body>
</html>
